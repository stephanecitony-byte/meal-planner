<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weekly Meals">
<meta name="theme-color" content="#fdf8f2">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="meal-icon-192.png">
<title>Weekly Meals</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf8f2;
    --surface: #fff8ee;
    --surface2: #fff3e0;
    --border: #e8d5b8;
    --border2: #e8c17a;
    --text: #2c1f0e;
    --muted: #a07840;
    --accent: #b87333;
    --accent2: #9a6420;
    --green: #2d8a4e;
    --green-bg: #edf7f0;
    --red: #c0392b;
    --red-bg: #fff0ee;
    --red-border: #e8a090;
    --blue: #2b7ec9;
    --blue-bg: #eaf4fb;
    --blue-border: #90c0e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 100px; padding-top: env(safe-area-inset-top); }

  .header { padding: 2rem 1.25rem 0.75rem; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 44px; height: 44px; background: #fff8ee; border: 1px solid var(--border2); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 24px; height: 24px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 400; line-height: 1; color: var(--text); }
  .logo-text em { font-style: italic; color: var(--accent); }
  .reset-btn { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 99px; padding: 7px 14px; font-size: 11px; color: var(--red); font-family: 'Outfit', sans-serif; cursor: pointer; margin-top: 4px; }
  .week-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 8px; padding-left: 56px; }

  .days-list { padding: 1rem 1.25rem 0; display: flex; flex-direction: column; gap: 10px; }

  .day-card { background: #ffffff; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; transition: border-color 0.2s; }
  .day-card.has-recipe { border-color: var(--border2); background: var(--surface); }
  .day-header { display: flex; align-items: center; gap: 12px; padding: 0.9rem 1rem; cursor: pointer; }
  .day-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .day-card.has-recipe .day-dot { background: var(--accent); }
  .day-name { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); width: 80px; flex-shrink: 0; }
  .day-card.has-recipe .day-name { color: var(--text); }
  .day-meal { font-size: 14px; color: var(--accent); font-family: 'Playfair Display', serif; font-style: italic; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-empty { font-size: 13px; color: #ccc; flex: 1; }
  .day-chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-body { display: none; border-top: 1px solid var(--border); padding: 1rem; background: #fffdf8; }
  .day-card.open .day-body { display: block; }

  .field-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 5px; }
  .field-input { width: 100%; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.85rem; font-size: 14px; color: var(--text); font-family: 'Outfit', sans-serif; outline: none; margin-bottom: 10px; }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: #cbb890; }

  .methods-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .method-btn { padding: 0.75rem 0.5rem; border-radius: 12px; border: 1px solid var(--border); background: #fff; color: var(--muted); font-size: 12px; font-family: 'Outfit', sans-serif; cursor: pointer; text-align: center; transition: all 0.2s; line-height: 1.4; }
  .method-btn .method-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .method-btn.active-name { border-color: var(--accent); color: var(--accent); background: var(--surface); }
  .method-btn.active-photo { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

  .method-panel { display: none; }
  .method-panel.visible { display: block; }

  .photo-drop { width: 100%; background: #fff; border: 1.5px dashed var(--border); border-radius: 12px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; margin-bottom: 10px; transition: border-color 0.2s; }
  .photo-drop:active { border-color: var(--blue); }
  .photo-drop-icon { font-size: 28px; margin-bottom: 6px; }
  .photo-drop-text { font-size: 13px; color: var(--muted); }
  .photo-drop-hint { font-size: 11px; color: #cbb890; margin-top: 3px; }
  .photo-preview { width: 100%; border-radius: 10px; margin-bottom: 10px; max-height: 200px; object-fit: cover; border: 1px solid var(--border); display: none; }

  .ai-btn { width: 100%; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; color: var(--accent); font-size: 13px; font-weight: 500; font-family: 'Outfit', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; transition: opacity 0.2s; }
  .ai-btn:active { opacity: 0.8; }
  .ai-btn.loading { opacity: 0.6; pointer-events: none; }
  .ai-btn.photo-mode { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .spinner.blue { border-color: var(--blue-border); border-top-color: var(--blue); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ingredients-box { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem; margin-bottom: 10px; }
  .ing-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .ing-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .edit-ing-btn { color: var(--accent); font-size: 11px; cursor: pointer; background: none; border: none; font-family: 'Outfit', sans-serif; padding: 0; }
  .ingredient-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .ingredient-list li { font-size: 13px; color: var(--text); display: flex; align-items: baseline; gap: 7px; line-height: 1.4; }
  .ingredient-list li::before { content: '·'; color: var(--accent); font-size: 16px; line-height: 1; flex-shrink: 0; }
  .ingredients-textarea { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; font-family: 'Outfit', sans-serif; resize: none; line-height: 1.7; min-height: 80px; }

  .link-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .link-row .field-input { margin-bottom: 0; flex: 1; }
  .open-link-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.85rem; color: var(--accent); font-size: 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

  .save-btn { width: 100%; padding: 0.75rem; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; font-family: 'Outfit', sans-serif; cursor: pointer; }
  .save-btn:active { opacity: 0.85; }
  .clear-day-btn { width: 100%; padding: 0.6rem; background: none; border: 1px solid var(--border); border-radius: 10px; font-size: 12px; color: var(--muted); font-family: 'Outfit', sans-serif; cursor: pointer; margin-top: 6px; }

  .summary-bar { margin: 1.25rem 1.25rem 0; background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 1rem 1.25rem; }
  .summary-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 8px; }
  .summary-count { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); line-height: 1; }
  .summary-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .all-ingredients { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .all-ing-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .ing-pill { background: #fff; border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; font-size: 11px; color: var(--text); }

  .toast { position: fixed; top: calc(1rem + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) translateY(-80px); background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 10px 18px; font-size: 13px; color: var(--text); z-index: 999; transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); white-space: nowrap; max-width: 90vw; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: #5dbf7a; color: var(--green); }
  .toast.err { border-color: var(--red-border); color: var(--red); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-top">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 3v4c0 1.1.9 2 2 2h0c1.1 0 2-.9 2-2V3" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 9v12" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M16 3v18" stroke="#b87333" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 9c1.7 0 3-1.3 3-3V3" stroke="#b87333" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">Weekly<br><em>Meals</em></div>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </div>
  <div class="week-label" id="weekLabel"></div>
</div>

<div class="days-list" id="daysList"></div>
<div class="summary-bar" id="summaryBar"></div>
<div class="summary-bar" id="shoppingList" style="margin-top:10px;"></div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
let state = JSON.parse(localStorage.getItem('mealplanner_v4') || 'null') || {
  meals: DAYS.map(d => ({ day:d, name:'', link:'', ingredients:[], editing:false }))
};
if (state.meals.length !== 7) {
  state.meals = DAYS.map((d,i) => state.meals[i] || { day:d, name:'', link:'', ingredients:[], editing:false });
}

let openDay = null;
let activeMethod = {};
let photoData = {};

function save() { localStorage.setItem('mealplanner_v4', JSON.stringify(state)); }

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function resetAll() {
  if (!confirm('Reset all meals for this week?')) return;
  state.meals = DAYS.map(d => ({ day:d, name:'', link:'', ingredients:[], editing:false }));
  openDay = null; activeMethod = {}; photoData = {};
  save(); render();
}

function toggleDay(i) {
  openDay = openDay === i ? null : i;
  if (!activeMethod[i]) activeMethod[i] = 'name';
  render();
  if (openDay === i) setTimeout(() => {
    document.getElementById('card-'+i)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 100);
}

function setMethod(i, method) {
  activeMethod[i] = method;
  render(); openDay = i; render();
}

function compressImage(dataUrl, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

function handlePhoto(i, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  if (!photoData[i]) photoData[i] = [];
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const compressed = await compressImage(e.target.result, 1200, 0.75);
      photoData[i].push(compressed);
      loaded++;
      if (loaded === files.length) {
        renderPhotoPreviews(i);
        showToast(files.length > 1 ? files.length + ' photos loaded!' : 'Photo loaded!', 'ok');
      }
    };
    reader.readAsDataURL(file);
  });
}

function removePhoto(i, idx) {
  photoData[i].splice(idx, 1);
  renderPhotoPreviews(i);
}

function renderPhotoPreviews(i) {
  const wrap = document.getElementById('photo-previews-'+i);
  if (!wrap) return;
  const photos = photoData[i] || [];
  if (!photos.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;">' +
    photos.map((src, idx) => `<div style="position:relative;"><img src="${src}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);"><button onclick="removePhoto(${i},${idx})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:11px;cursor:pointer;line-height:1;">x</button></div>`).join('') + '</div>';
}

async function generateFromName(i) {
  const name = document.getElementById('name-'+i).value.trim();
  const link = document.getElementById('link-'+i).value.trim();
  if (!name) { showToast('Enter a dish name first', 'err'); return; }

  const btn = document.getElementById('aibtn-name-'+i);
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner"></div> Generating...';

  const prompt = `You are a cooking assistant. Generate a practical ingredient list in English for: "${name}".
${link ? 'Recipe reference: ' + link : ''}
Respond ONLY with a JSON array of strings. Each string = one ingredient with quantity.
Example: ["2 chicken breasts","1 cup basmati rice","3 garlic cloves","1 tsp cumin","salt and pepper to taste"]
No preamble, no markdown. Just the raw JSON array.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role:'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '[]';
    const ingredients = JSON.parse(raw.replace(/```json|```/g,'').trim());
    state.meals[i] = { ...state.meals[i], name, link: link||state.meals[i].link, ingredients, editing:false };
    save(); openDay = i; render();
    showToast('✓ Ingredients generated!', 'ok');
  } catch(e) {
    showToast('Error — try again', 'err');
    btn.classList.remove('loading');
    btn.innerHTML = '✦ Generate ingredients with AI';
  }
}

async function generateFromPhoto(i) {
  const photos = photoData[i];
  if (!photos || !photos.length) { showToast('Upload a photo first', 'err'); return; }

  const btn = document.getElementById('aibtn-photo-'+i);
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner blue"></div> Reading recipe...';

  const prompt = `Look at these recipe screenshots. Extract ALL ingredients listed across all images.
If you can see the dish name, return it on the first line as: DISH: [name]
Then return a JSON array of ingredient strings with quantities.

Format:
DISH: Coconut Red Curry Chicken
["300g chicken sliced","1 can coconut milk","2 tbsp red curry paste"]

Only the DISH line and JSON array. Nothing else.`;

  const imageBlocks = photos.map(p => ({
    type: 'image',
    source: { type: 'base64', media_type: 'image/jpeg', data: p.split(',')[1] }
  }));

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [...imageBlocks, { type: 'text', text: prompt }]
        }]
      })
    });

    const data = await res.json();
    if (data.error) { throw new Error(data.error.message); }

    const raw = (data.content?.[0]?.text || '').trim();
    const lines = raw.split('\n').filter(l => l.trim());
    let dishName = state.meals[i].name;
    let jsonStr = raw;

    if (lines[0] && lines[0].startsWith('DISH:')) {
      dishName = lines[0].replace('DISH:', '').trim();
      jsonStr = lines.slice(1).join('\n');
    }

    const ingredients = JSON.parse(jsonStr.replace(/```json|```/g,'').trim());
    const nameInput = document.getElementById('name-'+i);
    if (nameInput && !nameInput.value.trim() && dishName) nameInput.value = dishName;

    state.meals[i] = { ...state.meals[i], name: dishName || state.meals[i].name, ingredients, editing:false };
    save(); openDay = i; render();
    showToast('✓ Recipe read from photo!', 'ok');
  } catch(e) {
    showToast('Could not read — try again', 'err');
    btn.classList.remove('loading');
    btn.innerHTML = '📷 Read ingredients from photo';
  }
}

function saveMeal(i) {
  const name = document.getElementById('name-'+i)?.value.trim() || state.meals[i].name;
  const link = document.getElementById('link-'+i)?.value.trim() || state.meals[i].link;
  const ta = document.getElementById('ing-textarea-'+i);
  const ingredients = ta ? ta.value.split('\n').map(l=>l.trim()).filter(Boolean) : state.meals[i].ingredients;
  state.meals[i] = { ...state.meals[i], name, link, ingredients, editing:false };
  save(); openDay = null; render();
  showToast('✓ Saved!', 'ok');
}

function clearDay(i) {
  if (!confirm('Clear this day?')) return;
  state.meals[i] = { day:DAYS[i], name:'', link:'', ingredients:[], editing:false };
  delete photoData[i];
  save(); openDay = null; render();
}

function openLink(i) {
  const link = document.getElementById('link-'+i)?.value.trim() || state.meals[i].link;
  if (link) window.open(link, '_blank');
  else showToast('No link entered', 'err');
}

function toggleEdit(i) {
  state.meals[i].editing = !state.meals[i].editing;
  save(); openDay = i; render();
}

function render() {
  document.getElementById('daysList').innerHTML = DAYS.map((day, i) => {
    const m = state.meals[i];
    const hasRecipe = !!(m.name || m.ingredients.length);
    const isOpen = openDay === i;
    const method = activeMethod[i] || 'name';

    let ingSection = '';
    if (m.ingredients.length > 0) {
      ingSection = `<div class="ingredients-box">
        <div class="ing-header">
          <span class="ing-title">Ingredients (${m.ingredients.length})</span>
          <button class="edit-ing-btn" onclick="toggleEdit(${i})">${m.editing?'done':'edit'}</button>
        </div>
        ${m.editing
          ? `<textarea class="ingredients-textarea" id="ing-textarea-${i}">${m.ingredients.join('\n')}</textarea>`
          : `<ul class="ingredient-list">${m.ingredients.map(ing=>`<li>${ing}</li>`).join('')}</ul>`
        }
      </div>`;
    }

    const namePanel = `<div class="method-panel ${method==='name'?'visible':''}">
      <div class="field-label">Dish name</div>
      <input class="field-input" id="name-${i}" placeholder="e.g. Creamy salmon pasta" value="${m.name}">
      <div class="field-label">Recipe link (optional)</div>
      <div class="link-row">
        <input class="field-input" id="link-${i}" placeholder="https://..." value="${m.link||''}">
        ${m.link ? `<button class="open-link-btn" onclick="openLink(${i})">Open ↗</button>` : ''}
      </div>
      <button class="ai-btn" id="aibtn-name-${i}" onclick="generateFromName(${i})">✦ Generate ingredients with AI</button>
    </div>`;

    const photoPanel = `<div class="method-panel ${method==='photo'?'visible':''}">
      <div class="field-label">Screenshot of the recipe</div>
      <div class="photo-drop" onclick="document.getElementById('photo-input-${i}').click()">
        <input type="file" id="photo-input-${i}" accept="image/*" multiple onchange="handlePhoto(${i}, this)" style="display:none">
        <div class="photo-drop-icon">📷</div>
        <div class="photo-drop-text">Tap to add screenshots</div>
        <div class="photo-drop-hint">Select multiple photos at once</div>
      </div>
      <div id="photo-previews-${i}"></div>
      <div class="field-label">Dish name (optional)</div>
      <input class="field-input" id="name-${i}" placeholder="e.g. Coconut curry chicken" value="${m.name}">
      <div class="field-label">Recipe link (optional — to open later)</div>
      <div class="link-row">
        <input class="field-input" id="link-${i}" placeholder="https://instagram.com/..." value="${m.link||''}">
        ${m.link ? `<button class="open-link-btn" onclick="openLink(${i})">Open ↗</button>` : ''}
      </div>
      <button class="ai-btn photo-mode" id="aibtn-photo-${i}" onclick="generateFromPhoto(${i})">📷 Read ingredients from photo</button>
    </div>`;

    return `<div class="day-card ${hasRecipe?'has-recipe':''} ${isOpen?'open':''}" id="card-${i}">
      <div class="day-header" onclick="toggleDay(${i})">
        <div class="day-dot"></div>
        <div class="day-name">${day}</div>
        ${hasRecipe ? `<div class="day-meal">${m.name||'Recipe saved'}</div>` : `<div class="day-empty">Tap to add</div>`}
        <div class="day-chevron">▼</div>
      </div>
      ${isOpen ? `<div class="day-body">
        <div class="methods-row">
          <button class="method-btn ${method==='name'?'active-name':''}" onclick="setMethod(${i},'name')">
            <span class="method-icon">✦</span>By dish name
          </button>
          <button class="method-btn ${method==='photo'?'active-photo':''}" onclick="setMethod(${i},'photo')">
            <span class="method-icon">📷</span>From photo
          </button>
        </div>
        ${namePanel}
        ${photoPanel}
        ${ingSection}
        <button class="save-btn" onclick="saveMeal(${i})">Save</button>
        ${hasRecipe ? `<button class="clear-day-btn" onclick="clearDay(${i})">Clear this day</button>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');

  const filled = state.meals.filter(m=>m.name||m.ingredients.length).length;
  const allIng = [...new Set(state.meals.flatMap(m=>m.ingredients))];
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-title">This week</div>
    <div class="summary-count">${filled}<span style="font-size:1rem;color:var(--muted)"> / 7</span></div>
    <div class="summary-sub">meals planned</div>`;
  renderShoppingList();
}

const CATEGORIES = {
  'Vegetables & Fruits': ['tomato','tomatoes','onion','onions','garlic','pepper','peppers','carrot','carrots','spinach','lettuce','broccoli','zucchini','mushroom','mushrooms','potato','potatoes','sweet potato','celery','cucumber','avocado','lemon','lime','ginger','scallion','shallot','kale','snap peas','peas','corn','eggplant','cauliflower','asparagus','artichoke','leek','chili','chilis','chilies','bell pepper','red onion','green onion','cilantro','parsley','basil','thyme','rosemary','mint','dill','herb','herbs','vegetable','vegetables','fruit','fruits','apple','banana','mango','pineapple','cherry','berries','berry','orange','courgette'],
  'Meat & Poultry': ['chicken','beef','pork','lamb','turkey','duck','veal','bacon','ham','sausage','ground beef','ground turkey','ground pork','steak','ribs','tenderloin','thigh','breast','wing','drumstick','mince','minced','meat','poultry','prosciutto','pancetta','chorizo','salami'],
  'Fish & Seafood': ['salmon','tuna','shrimp','prawn','prawns','cod','tilapia','halibut','sea bass','trout','sardine','anchovy','crab','lobster','scallop','scallops','oyster','mussel','clam','squid','octopus','fish','seafood','mahi'],
  'Dairy & Eggs': ['milk','cream','butter','cheese','parmesan','mozzarella','cheddar','feta','ricotta','brie','yogurt','sour cream','heavy cream','egg','eggs','half and half','ghee','kefir','whipped cream','cream cheese','cottage cheese'],
  'Pantry & Grains': ['rice','pasta','noodle','noodles','flour','bread','quinoa','oat','oats','lentil','lentils','chickpea','chickpeas','bean','beans','couscous','barley','bulgur','tortilla','crouton','breadcrumb','panko','cornstarch','cornmeal','semolina','polenta'],
  'Sauces & Condiments': ['sauce','soy sauce','fish sauce','oyster sauce','hoisin','ketchup','mustard','mayonnaise','vinegar','olive oil','oil','sesame oil','coconut milk','tomato paste','broth','stock','wine','mirin','tahini','pesto','hot sauce','sriracha','worcestershire','teriyaki','curry paste','paste'],
  'Spices & Seasonings': ['salt','pepper','cumin','turmeric','paprika','coriander','cinnamon','oregano','chili powder','cayenne','curry','cardamom','clove','nutmeg','bay leaf','bay leaves','star anise','allspice','seasoning','spice','spices','powder','dried','flakes','extract','vanilla','sugar','brown sugar','honey','maple syrup','saffron'],
};

function categorize(ingredients) {
  const cats = {};
  const used = new Set();
  for (const [cat, keywords] of Object.entries(CATEGORIES)) {
    cats[cat] = [];
    for (const ing of ingredients) {
      if (used.has(ing)) continue;
      const lower = ing.toLowerCase();
      if (keywords.some(k => lower.includes(k))) {
        cats[cat].push(ing);
        used.add(ing);
      }
    }
  }
  cats['Other'] = ingredients.filter(ing => !used.has(ing));
  return cats;
}

function renderShoppingList() {
  const allIng = [...new Set(state.meals.flatMap(m=>m.ingredients))];
  const manual = state.manualItems || [];
  const allItems = [...allIng, ...manual.map(m=>m.text)];
  const categorized = categorize(allItems);
  const catIcons = {'Vegetables & Fruits':'🥦','Meat & Poultry':'🥩','Fish & Seafood':'🐟','Dairy & Eggs':'🥚','Pantry & Grains':'🌾','Sauces & Condiments':'🫙','Spices & Seasonings':'🧂','Other':'🛒'};
  const hasItems = allItems.length > 0;
  const el = document.getElementById('shoppingList');
  if (!el) return;

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
  html += '<div class="summary-title" style="margin:0;">Shopping list</div>';
  if (hasItems) html += '<button onclick="copyList()" style="background:var(--accent);color:#fff;border:none;border-radius:99px;padding:6px 14px;font-size:11px;font-family:Outfit,sans-serif;cursor:pointer;">Copy list</button>';
  html += '</div>';

  if (hasItems) {
    Object.entries(categorized).forEach(([cat, items]) => {
      if (!items.length) return;
      html += '<div style="margin-bottom:12px;">';
      html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;">' + (catIcons[cat]||'•') + ' ' + cat + '</div>';
      html += '<div style="display:flex;flex-direction:column;gap:4px;">';
      items.forEach(ing => {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fff;border-radius:8px;border:1px solid var(--border);font-size:13px;color:var(--text);">';
        html += '<span style="color:var(--accent);font-size:14px;">·</span>' + ing + '</div>';
      });
      html += '</div></div>';
    });
  } else {
    html += '<div style="font-size:13px;color:#cbb890;text-align:center;padding:1rem 0;">Add meals above to see your shopping list</div>';
  }

  html += '<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">';
  html += '<div class="summary-title" style="margin-bottom:8px;">Add manually</div>';
  html += '<div style="display:flex;gap:8px;">';
  html += '<input id="manualInput" class="field-input" style="margin:0;flex:1;" placeholder="e.g. Olive oil, napkins..." onkeydown="if(event.key==='Enter')addManual()">';
  html += '<button onclick="addManual()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0 16px;font-size:13px;font-family:Outfit,sans-serif;cursor:pointer;white-space:nowrap;">Add</button>';
  html += '</div>';

  if (manual.length > 0) {
    html += '<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">';
    manual.forEach((m, idx) => {
      html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#fff;border-radius:8px;border:1px solid var(--border);font-size:13px;">';
      html += '<span style="color:var(--accent);font-size:14px;">·</span>';
      html += '<span style="flex:1;color:var(--text);">' + m.text + '</span>';
      html += '<button onclick="removeManual(' + idx + ')" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 4px;">✕</button>';
      html += '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}
function addManual() {
  const input = document.getElementById('manualInput');
  const val = input.value.trim();
  if (!val) return;
  if (!state.manualItems) state.manualItems = [];
  state.manualItems.push({ text: val });
  input.value = '';
  save(); renderShoppingList();
}

function removeManual(idx) {
  state.manualItems.splice(idx, 1);
  save(); renderShoppingList();
}

function copyList() {
  const allIng = [...new Set(state.meals.flatMap(m=>m.ingredients))];
  const manual = (state.manualItems || []).map(m=>m.text);
  const categorized = categorize([...allIng, ...manual]);
  const catIcons = {'Vegetables & Fruits':'🥦','Meat & Poultry':'🥩','Fish & Seafood':'🐟','Dairy & Eggs':'🥚','Pantry & Grains':'🌾','Sauces & Condiments':'🫙','Spices & Seasonings':'🧂','Other':'🛒'};
  const lines = [];
  Object.entries(categorized).forEach(([cat, items]) => {
    if (!items.length) return;
    lines.push((catIcons[cat]||'') + ' ' + cat);
    items.forEach(i => lines.push('• ' + i));
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('List copied!','ok')).catch(()=>showToast('Could not copy','err'));
}
